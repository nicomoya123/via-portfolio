<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="robots" content="noindex">
    <title>Avia Ben Uriah — share card</title>
    <style>
        @font-face {
            font-family: "Fraunces";
            src: url("fonts/fraunces-v38-latin-regular.woff2") format("woff2");
            font-weight: 400;
            font-style: normal;
            font-display: block;
        }
        @font-face {
            font-family: "Fraunces";
            src: url("fonts/fraunces-v38-latin-700.woff2") format("woff2");
            font-weight: 700;
            font-style: normal;
            font-display: block;
        }
        @font-face {
            font-family: "Source Serif 4";
            src: url("fonts/source-serif-4-v14-latin-regular.woff2") format("woff2");
            font-weight: 400;
            font-style: normal;
            font-display: block;
        }
        @font-face {
            font-family: "Source Serif 4";
            src: url("fonts/source-serif-4-v14-latin-italic.woff2") format("woff2");
            font-weight: 400;
            font-style: italic;
            font-display: block;
        }
        @font-face {
            font-family: "Inter";
            src: url("fonts/inter-v20-latin-500.woff2") format("woff2");
            font-weight: 500;
            font-style: normal;
            font-display: block;
        }

        :root {
            --paper: #F5F0E8;
            --ink: #1A1A1A;
            --ink-40: rgba(26, 26, 26, 0.40);
            --ink-60: rgba(26, 26, 26, 0.60);
            --rust: #B4531A;
        }

        html, body {
            margin: 0;
            padding: 0;
            background: var(--paper);
            color: var(--ink);
        }

        body {
            width: 1200px;
            height: 630px;
            overflow: hidden;
            font-family: "Source Serif 4", Georgia, serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            padding: 80px 96px;
            text-align: center;
        }

        .name {
            font-family: "Fraunces", Georgia, serif;
            font-weight: 400;
            font-variation-settings: "opsz" 144;
            font-size: 140px;
            line-height: 0.9;
            letter-spacing: -0.03em;
            color: var(--ink);
            margin: 0;
            white-space: nowrap;
        }

        .disciplines {
            margin: 36px 0 0;
            max-width: 44ch;
            font-family: "Source Serif 4", Georgia, serif;
            font-weight: 400;
            font-style: normal;
            font-size: 24px;
            line-height: 1.4;
            color: var(--ink);
        }

        .disciplines .dot {
            color: var(--ink-40);
            margin: 0 0.45em;
        }

        .standfirst {
            margin: 32px 0 0;
            max-width: 36ch;
            font-family: "Source Serif 4", Georgia, serif;
            font-style: italic;
            font-weight: 400;
            font-size: 22px;
            line-height: 1.45;
            color: var(--ink);
        }

        .standfirst em {
            font-style: italic;
        }

        .dateline {
            margin: 44px 0 0;
            font-family: "Inter", "Helvetica Neue", Arial, sans-serif;
            font-weight: 500;
            font-size: 13px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            line-height: 1.4;
            color: var(--ink-60);
        }

        .dateline .dot {
            color: var(--rust);
            margin: 0 0.4em;
        }
    </style>
</head>
<body>
    <h1 class="name">Avia Ben Uriah</h1>
    <p class="disciplines">
        Brand Narrative<span class="dot">·</span>Creative<span class="dot">·</span>Content Marketing<span class="dot">·</span>Screenwriting
    </p>
    <p class="dateline">
        Tel Aviv <span class="dot">·</span> Portfolio
    </p>
</body>
</html>
