<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="robots" content="noindex">
    <title>Avia Ben Uriah — share card</title>
    <style>
        @font-face {
            font-family: "Fraunces";
            src: url("fonts/fraunces-v38-latin-700.woff2") format("woff2");
            font-weight: 700;
            font-style: normal;
            font-display: block;
        }
        @font-face {
            font-family: "Source Serif 4";
            src: url("fonts/source-serif-4-v14-latin-regular.woff2") format("woff2");
            font-weight: 400;
            font-style: normal;
            font-display: block;
        }
        @font-face {
            font-family: "Source Serif 4";
            src: url("fonts/source-serif-4-v14-latin-italic.woff2") format("woff2");
            font-weight: 400;
            font-style: italic;
            font-display: block;
        }
        @font-face {
            font-family: "Inter";
            src: url("fonts/inter-v20-latin-500.woff2") format("woff2");
            font-weight: 500;
            font-style: normal;
            font-display: block;
        }

        :root {
            --paper: #F5F0E8;
            --ink: #1A1A1A;
            --ink-60: rgba(26, 26, 26, 0.60);
            --rust: #B4531A;
        }

        html, body {
            margin: 0;
            padding: 0;
            background: var(--paper);
            color: var(--ink);
        }

        body {
            width: 1200px;
            height: 630px;
            overflow: hidden;
            font-family: "Source Serif 4", Georgia, serif;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            padding: 56px 80px;
        }

        .top {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            font-family: "Inter", system-ui, sans-serif;
            font-weight: 500;
            font-size: 18px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--ink);
        }

        .top__meta { color: var(--ink-60); }

        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }

        .name {
            font-family: "Fraunces", Georgia, serif;
            font-weight: 700;
            font-size: 124px;
            line-height: 1;
            letter-spacing: -0.02em;
            color: var(--ink);
            margin: 0 0 36px;
            white-space: nowrap;
        }

        .disciplines {
            font-family: "Inter", system-ui, sans-serif;
            font-weight: 500;
            font-size: 22px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--ink-60);
            margin: 0 0 40px;
        }

        .disciplines .dot {
            display: inline-block;
            margin: 0 14px;
            color: var(--rust);
        }

        .standfirst {
            font-family: "Source Serif 4", Georgia, serif;
            font-size: 28px;
            line-height: 1.45;
            margin: 0;
        }

        .standfirst__quote {
            color: var(--rust);
            display: block;
        }

        .standfirst__attr {
            font-style: italic;
            color: var(--ink);
            display: block;
            margin-top: 6px;
        }

        .bottom {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            font-family: "Inter", system-ui, sans-serif;
            font-weight: 500;
            font-size: 16px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--ink-60);
        }

        .bottom__url { color: var(--rust); }
    </style>
</head>
<body>
    <div class="top">
        <span>Avia Ben Uriah</span>
        <span class="top__meta">Portfolio</span>
    </div>

    <div class="hero">
        <h1 class="name">Avia Ben Uriah</h1>
        <p class="disciplines">
            Brand Narrative<span class="dot">·</span>Creative<span class="dot">·</span>Content Marketing<span class="dot">·</span>Screenwriting
        </p>
        <p class="standfirst">
            <span class="standfirst__quote">&ldquo;The most personal is the most creative.&rdquo;</span>
            <span class="standfirst__attr">Martin Scorsese said it. I try to work by it.</span>
        </p>
    </div>

    <div class="bottom">
        <span>Tel Aviv</span>
        <span class="bottom__url">aviabu.com</span>
    </div>
</body>
</html>
